# WIP — HiSilicon WS63 (Hi3863). Not yet in the registry: depends on the
# RiscvCoreAccessOptions.dm_base change (see README + mem_ap_dtm.patch.txt) and a
# flash algorithm. Debug (attach/halt/mem/regs) works once dm_base lands; flashing
# needs the SFC flash algorithm. Move to probe-rs/targets/ after validation.
name: HiSilicon WS63
manufacturer:
  # HiSilicon JEP106: continuation 0x06, id 0x4b (verify against silicon DAP)
  id: 0x4b
  cc: 0x6
variants:
- name: WS63
  cores:
  - name: main
    type: riscv
    core_access_options: !Riscv
      hart_id: 0
      # RISC-V DM is behind CoreSight AP 0 (OpenOCD -apsel 0), DM @ 0x80000000.
      mem_ap: !v1 0
      dm_base: 0x80000000   # NEW field — see mem_ap_dtm.patch.txt
  memory_map:
  - !Nvm                      # XIP SPI NOR flash (8 MB)
    range:
      start: 0x200000
      end: 0xA00000
    cores: [main]
    access:
      boot: true
  - !Ram                      # L2 SRAM (576 K default)
    range:
      start: 0xA00000
      end: 0xA90000
    cores: [main]
  - !Ram                      # ITCM
    range:
      start: 0x14C000
      end: 0x150000
    cores: [main]
  - !Ram                      # DTCM
    range:
      start: 0x180000
      end: 0x184000
    cores: [main]
  # flash_algorithms: []  TODO — port OpenOCD src/flash/nor/ws63.c (SFC) into a
  # probe-rs flash-algorithm blob. App/PROGRAM region begins at 0x230300.
