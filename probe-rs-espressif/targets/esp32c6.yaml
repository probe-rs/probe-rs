name: esp32c6
manufacturer:
  id: 0x12
  cc: 0xc
chip_detection:
- !Espressif
  idcode: 0xdc25
  variants:
    0x2ce0806f: esp32c6
variants:
- name: esp32c6
  cores:
  - name: main
    type: riscv
    core_access_options: !Riscv
  memory_map:
  - !Nvm
    name: 16 MB Max addressable Flash
    range:
      start: 0x0
      end: 0x1000000
    cores:
    - main
    access:
      execute: false
      boot: true
  - !Generic
    name: ROM
    range:
      start: 0x40000000
      end: 0x40050000
    cores:
    - main
  - !Ram
    range:
      start: 0x40800000
      end: 0x40880000
    cores:
    - main
  - !Nvm
    name: External flash (Read Only)
    range:
      start: 0x42000000
      end: 0x43000000
    cores:
    - main
    is_alias: true
  flash_algorithms:
  - esp32c6-flashloader
  jtag:
    scan_chain:
    - name: main
      ir_len: 5
  default_binary_format: idf
flash_algorithms:
- name: esp32c6-flashloader
  description: A flash loader for the esp32c6.
  default: true
  instructions: 
  load_address: 0x40810000
  data_load_address: 0x40840000
  pc_init: 0x3e2
  pc_uninit: 0x6a2
  pc_program_page: 0x53e
  pc_erase_sector: 0x2f2
  pc_erase_all: 0x2d2
  pc_verify: 0x710
  pc_blank_check: 0x188
  pc_read: 0x5f4
  vendor_functions:
    FlashSize: 0x708
    ChipRevision: 0x700
  data_section_offset: 0xc84
  rtt_location: 0x40852c0c
  rtt_poll_interval: 500
  flash_properties:
    address_range:
      start: 0x0
      end: 0x1000000
    page_size: 0x4000
    erased_byte_value: 0xff
    program_page_timeout: 2000
    erase_sector_timeout: 2000
    sectors:
    - size: 0x10000
      address: 0x0
  cores:
  - main
  stack_overflow_check: false
  transfer_encoding: miniz
