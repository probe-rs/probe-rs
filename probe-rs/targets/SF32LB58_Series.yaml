name: SF32LB58 Series
variants:
- name: SF32LB58
  cores:
  - name: hcpu
    type: armv8m
    core_access_options: !Arm
      ap: !v1 0
  memory_map:
  - !Ram
    name: Retention SRAM
    range:
      start: 0x20000
      end: 0x30000
    cores:
    - hcpu
  - !Nvm
    name: Flash4
    range:
      start: 0x18000000
      end: 0x18f00000
    cores:
    - hcpu
  - !Ram
    name: SRAM
    range:
      start: 0x20000000
      end: 0x20200000
    cores:
    - hcpu
    access:
      boot: true
  - !Ram
    name: ACPU SRAM
    range:
      start: 0x20200000
      end: 0x20280000
    cores:
    - hcpu
  - !Nvm
    name: Flash3
    range:
      start: 0x64000000
      end: 0x68000000
    cores:
    - hcpu
  flash_algorithms:
  - sf32lb58x
flash_algorithms:
- name: sf32lb58x
  description: SF32LB58X UNI_FLASH
  default: true
  instructions: 
  pc_init: 0x1
  pc_uninit: 0x18d
  pc_program_page: 0x1a7
  pc_erase_sector: 0x191
  data_section_offset: 0x3fcc
  address_relocation_ranges:
  - offset: 0x3fcc
    size: 0x54
  - offset: 0x4020
    size: 0xc
  rtt_poll_interval: 20
  flash_properties:
    address_range:
      start: 0x10000000
      end: 0x70000000
    page_size: 0x2000
    erased_byte_value: 0xff
    program_page_timeout: 6000
    erase_sector_timeout: 3000
    sectors:
    - size: 0x10000
      address: 0x0
  cores:
  - hcpu
