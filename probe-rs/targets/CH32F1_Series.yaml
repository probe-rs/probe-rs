name: CH32F1 Series
chip_detection:
- !WchLink
  mask: 0xffffff0f
  variants:
    0x20004102: CH32F103C8T6
    0x2000410f: CH32F103R8T6
variants:
- name: CH32F103C6T6
  cores:
  - name: main
    type: armv7m
    core_access_options: !Arm
      ap: !v1 0
  memory_map:
  - !Nvm
    name: USR_LEGACY
    range:
      start: 0x0
      end: 0x8000
    cores:
    - main
    is_alias: true
  - !Nvm
    name: USR
    range:
      start: 0x8000000
      end: 0x8008000
    cores:
    - main
  - !Nvm
    name: SYS_1
    range:
      start: 0x1ffff000
      end: 0x1ffff800
    cores:
    - main
    is_alias: true
  - !Nvm
    name: OPT
    range:
      start: 0x1ffff800
      end: 0x1ffff880
    cores:
    - main
    is_alias: true
    access:
      execute: false
  - !Nvm
    name: VND
    range:
      start: 0x1ffff880
      end: 0x1ffff900
    cores:
    - main
    is_alias: true
    access:
      write: false
      execute: false
  - !Nvm
    name: SYS_2
    range:
      start: 0x1ffff900
      end: 0x20000000
    cores:
    - main
    is_alias: true
  - !Ram
    name: RAM
    range:
      start: 0x20000000
      end: 0x20002800
    cores:
    - main
  flash_algorithms:
  - ch32-v1-usr
  - ch32-v1-usr-legacy
  - ch32-v1-sys-1
  - ch32-v1-opt
  - ch32-v1-sys-2
