- name: ch32-v1-opt
  description: ch32-v1-opt
  default: true
  instructions: 
  load_address: 0x20000020
  pc_init: 0x57
  pc_uninit: 0x121
  pc_program_page: 0xb3
  pc_erase_sector: 0x9
  pc_erase_all: 0x1
  data_section_offset: 0x158
  flash_properties:
    address_range:
      start: 0x1ffff800
      end: 0x1ffff880
    page_size: 0x80
    erased_byte_value: 0xff
    program_page_timeout: 1000
    erase_sector_timeout: 2000
    sectors:
    - size: 0x80
      address: 0x0
