name: AVR
variants:
- name: ATmega4809
  cores:
  - name: main
    type: avr
    core_access_options: !Avr
      signature: [0x1e, 0x96, 0x51]
      flash_base: 0x4000
      flash_size: 0xC000
      flash_page_size: 128
      eeprom_base: 0x1400
      eeprom_size: 256
      eeprom_page_size: 64
      fuses_base: 0x1280
      fuses_size: 10
      lock_base: 0x128A
      lock_size: 1
      userrow_base: 0x1300
      userrow_size: 64
      signature_base: 0x1100
      prodsig_size: 128
      nvm_base: 0x1000
      ocd_base: 0x0F80
      syscfg_base: 0x0F00
      address_mode: 0
      hvupdi_variant: 1
  memory_map:
  # GDB AVR address spaces: program=0x0.., data=0x800000..
  # ATmega4809: 48KB flash, SRAM 0x3C00-0x3FFF
  - !Nvm
    name: Flash
    range:
      start: 0x0
      end: 0xC000
    cores: [main]
    access:
      boot: true
  - !Ram
    name: SRAM
    range:
      start: 0x803C00
      end: 0x804000
    cores: [main]
  - !Nvm
    name: EEPROM
    range:
      start: 0x801400
      end: 0x801500
    cores: [main]
  - !Generic
    name: Fuses
    range:
      start: 0x801280
      end: 0x80128A
    cores: [main]
  - !Generic
    name: Lock
    range:
      start: 0x80128A
      end: 0x80128B
    cores: [main]
  - !Generic
    name: UserRow
    range:
      start: 0x801300
      end: 0x801340
    cores: [main]
  - !Generic
    name: ProdSig
    range:
      start: 0x801100
      end: 0x801180
    cores: [main]
  flash_algorithms: []
