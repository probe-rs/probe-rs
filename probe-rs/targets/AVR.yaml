# AVR UPDI target definitions
# GDB AVR address spaces: program=0x0.., data=0x800000..
# All memory regions except Flash and SRAM are mapped at 0x800000+base.
name: AVR
variants:

# ---- tinyAVR (avr8x_tiny family) ----
# Shared: fuses 10B@0x1280, lock 1B@0x128A, userrow 32B@0x1300,
#         prodsig 64B@0x1100, address_mode=0, hvupdi_variant=0

- name: ATtiny1607
  cores:
  - name: main
    type: avr
    core_access_options: !Avr
      signature: [0x1e, 0x94, 0x23]
      flash_base: 0x8000
      flash_size: 0x4000
      flash_page_size: 64
      eeprom_base: 0x1400
      eeprom_size: 256
      eeprom_page_size: 32
      fuses_base: 0x1280
      fuses_size: 10
      lock_base: 0x128A
      lock_size: 1
      userrow_base: 0x1300
      userrow_size: 32
      signature_base: 0x1100
      prodsig_size: 64
      nvm_base: 0x1000
      ocd_base: 0x0F80
      syscfg_base: 0x0F00
      address_mode: 0
      hvupdi_variant: 0
  memory_map:
  - !Nvm
    name: Flash
    range:
      start: 0x0
      end: 0x4000
    cores: [main]
    access:
      boot: true
  - !Ram
    name: SRAM
    range:
      start: 0x803C00
      end: 0x804000
    cores: [main]
  - !Nvm
    name: EEPROM
    range:
      start: 0x801400
      end: 0x801500
    cores: [main]
  - !Generic
    name: Fuses
    range:
      start: 0x801280
      end: 0x80128A
    cores: [main]
  - !Generic
    name: Lock
    range:
      start: 0x80128A
      end: 0x80128B
    cores: [main]
  - !Generic
    name: UserRow
    range:
      start: 0x801300
      end: 0x801320
    cores: [main]
  - !Generic
    name: ProdSig
    range:
      start: 0x801100
      end: 0x801140
    cores: [main]
  flash_algorithms: []

