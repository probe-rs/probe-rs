  - name: main
    type: armv7m
    core_access_options: !Arm
      ap: 0
      psel: 0x0
  memory_map:
  - !Nvm
    name: BANK_1
    range:
      start: 0x8000000
      end: 0x8080000
    cores:
    - main
    access:
      write: false
      boot: true
  - !Ram
    name: SRAM
    range:
      start: 0x20000000
      end: 0x2001c000
    cores:
    - main
  - !Ram
    name: SRAM2
    range:
      start: 0x2001c000
      end: 0x20020000
    cores:
    - main
  flash_algorithms:
  - stm32f2xx_1024
  - stm32f2xx_opt
  - stm32f2xx_otp
