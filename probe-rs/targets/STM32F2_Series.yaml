flash_algorithms:
- name: stm32f2xx_1024
  description: STM32F2xx Flash
  default: true
  instructions: 
  pc_init: 0x1d
  pc_uninit: 0x4b
  pc_program_page: 0xd1
  pc_erase_sector: 0x85
  pc_erase_all: 0x59
  data_section_offset: 0x144
  flash_properties:
    address_range:
      start: 0x8000000
      end: 0x8100000
    page_size: 0x400
    erased_byte_value: 0xff
    program_page_timeout: 100
    erase_sector_timeout: 6000
    sectors:
    - size: 0x4000
      address: 0x0
    - size: 0x10000
      address: 0x10000
    - size: 0x20000
      address: 0x20000
- name: stm32f2xx_opt
  description: STM32F2xx Flash Options
  instructions: 
  pc_init: 0x1d
  pc_uninit: 0x47
  pc_program_page: 0x85
  pc_erase_sector: 0x81
  pc_erase_all: 0x55
  data_section_offset: 0xdc
  flash_properties:
    address_range:
      start: 0x1fffc000
      end: 0x1fffc010
    page_size: 0x10
    erased_byte_value: 0xff
    program_page_timeout: 3000
    erase_sector_timeout: 3000
    sectors:
    - size: 0x10
      address: 0x0
