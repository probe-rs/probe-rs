name: HiSilicon WS63
variants:
- name: WS63
  cores:
  - name: main
    type: riscv
    core_access_options: !Riscv
      hart_id: 0
      mem_ap: !v1 0
      dm_base: 2147483648
  memory_map:
  - !Ram
    range:
      start: 0x14c000
      end: 0x150000
    cores:
    - main
  - !Ram
    range:
      start: 0x180000
      end: 0x184000
    cores:
    - main
  - !Nvm
    range:
      start: 0x200000
      end: 0xa00000
    cores:
    - main
    access:
      boot: true
  - !Ram
    range:
      start: 0xa00000
      end: 0xa90000
    cores:
    - main
  flash_algorithms:
  - ws63-sfc
flash_algorithms:
- name: ws63-sfc
  description: ws63
  default: true
  instructions: 
  pc_init: 0x78
  pc_uninit: 0x240
  pc_program_page: 0x10a
  pc_erase_sector: 0x2
  data_section_offset: 0x2ac
  flash_properties:
    address_range:
      start: 0x200000
      end: 0xa00000
    page_size: 0x100
    erased_byte_value: 0xff
    program_page_timeout: 1000
    erase_sector_timeout: 5000
    sectors:
    - size: 0x1000
      address: 0x0
  cores:
  - main
