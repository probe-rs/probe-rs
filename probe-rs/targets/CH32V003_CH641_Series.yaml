flash_algorithms:
- name: ch32-v0-opt
  description: ch32-v0-opt
  default: true
  instructions: 
  load_address: 0x20000020
  pc_init: 0x48
  pc_uninit: 0xf8
  pc_program_page: 0x98
  pc_erase_sector: 0x4
  pc_erase_all: 0x0
  data_section_offset: 0x120
  flash_properties:
    address_range:
      start: 0x1ffff800
      end: 0x1ffff840
    page_size: 0x40
    erased_byte_value: 0xff
    program_page_timeout: 1000
    erase_sector_timeout: 2000
    sectors:
    - size: 0x40
      address: 0x0
- name: ch32-v0-sys
