chip_detection:
- !WchLink
  mask: 0xffffff0f
  variants:
    0x330500: CH32V003J4M6
    0x320500: CH32V003A4M6
    0x310500: CH32V003F4U6
    0x300500: CH32V003F4P6
    0x64100500: CH641F
    0x64150500: CH641U
    0x64110500: CH641D
    0x64120500: CH641X
    0x64160500: CH641P
variants:
- name: CH32V003J4M6
  cores:
  - name: main
    type: riscv
    core_access_options: !Riscv
      hart_id: 0
  memory_map:
  - !Nvm
    name: USR_LEGACY
    range:
      start: 0x0
      end: 0x4000
    cores:
    - main
    is_alias: true
  - !Nvm
    name: USR
    range:
      start: 0x8000000
      end: 0x8004000
    cores:
    - main
  - !Nvm
    name: SYS
    range:
      start: 0x1ffff000
      end: 0x1ffff780
    cores:
    - main
    is_alias: true
  - !Nvm
    name: VND
    range:
      start: 0x1ffff7c0
      end: 0x1ffff800
    cores:
    - main
    is_alias: true
    access:
      write: false
      execute: false
  - !Nvm
    name: OPT
    range:
      start: 0x1ffff800
      end: 0x1ffff840
    cores:
    - main
    is_alias: true
    access:
      execute: false
  - !Ram
    name: RAM
    range:
      start: 0x20000000
      end: 0x20000800
    cores:
    - main
  flash_algorithms:
  - ch32-v0-usr
  - ch32-v0-usr-legacy
  - ch32-v0-sys
  - ch32-v0-opt
