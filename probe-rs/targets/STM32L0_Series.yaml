flash_algorithms:
- name: stm32l0xx_192
  description: 'STM32L0 192KB Flash '
  default: true
  instructions: 
  pc_init: 0x1
  pc_uninit: 0x3d
  pc_program_page: 0x95
  pc_erase_sector: 0x5b
  data_section_offset: 0x11c
  flash_properties:
    address_range:
      start: 0x8000000
      end: 0x8030000
    page_size: 0x400
    erased_byte_value: 0x0
    program_page_timeout: 500
    erase_sector_timeout: 500
    sectors:
    - size: 0x80
      address: 0x0
