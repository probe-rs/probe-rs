  - name: mcxa15x_64
    description: MCXA1XX IAP 64kB Flash
    default: true
    instructions: 
    load_address: 0x20000008
    pc_init: 0x11d
    pc_uninit: 0x181
    pc_program_page: 0x2dd
    pc_erase_sector: 0x269
    pc_erase_all: 0x185
    pc_verify: 0x335
    data_section_offset: 0x690
    flash_properties:
      address_range:
        start: 0x0
        end: 0x10000
      page_size: 0x80
      erased_byte_value: 0xff
      program_page_timeout: 300
      erase_sector_timeout: 3000
